<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexoLearn</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <!-- NAV -->
  <header class="nav">
    <h1 class="logo">NexoLearn</h1>
    <button class="btn-primary" type="button" onclick="scrollToForm()">Entrar</button>
  </header>

  <!-- HERO -->
  <section class="hero">
    <h2>Convierte conocimiento en dinero</h2>
    <p>Aprende, enseña y genera ingresos reales.</p>
    <button class="btn-primary" type="button" onclick="scrollToForm()">Comenzar</button>
  </section>

  <!-- TERMINAL EXPERIENCE -->
  <section class="terminal">
    <p>&gt; Sistema activo</p>
    <h1>NEXOLEARN</h1>
    <p>No mostramos personas, mostramos conexiones óptimas.</p>
  </section>

  <!-- PLANILLA / ONBOARDING -->
  <section class="form-section" id="formulario">
    <h2>Activa tu perfil</h2>

    <form id="profileForm">
      <input type="text" name="name" placeholder="Nombre" required />
      <input type="email" name="email" placeholder="Email" required />

      <h3>🎯 Habilidades que enseñas</h3>
      <input name="teach1" placeholder="Habilidad 1" />
      <input name="teach2" placeholder="Habilidad 2" />
      <input name="teach3" placeholder="Habilidad 3" />
      <input name="teach4" placeholder="Habilidad 4" />
      <input name="teach5" placeholder="Habilidad 5" />

      <h3>📚 Intereses que quieres aprender</h3>
      <input name="learn1" placeholder="Interés 1" />
      <input name="learn2" placeholder="Interés 2" />
      <input name="learn3" placeholder="Interés 3" />
      <input name="learn4" placeholder="Interés 4" />
      <input name="learn5" placeholder="Interés 5" />

      <button type="submit" class="btn-primary big">
        Activar perfil
      </button>

      <p id="status"></p>
    </form>
  </section>

  <!-- FOOTER -->
  <footer>
    <p>© 2026 NexoLearn</p>
  </footer>

  <!-- EMAILJS -->
  <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
  <script>
    function scrollToForm() {
      const formSection = document.getElementById("formulario");
      if (formSection) {
        formSection.scrollIntoView({ behavior: "smooth" });
      }
    }

    emailjs.init("TU_PUBLIC_KEY");

    const form = document.getElementById("profileForm");
    const status = document.getElementById("status");

    form.addEventListener("submit", function (e) {
      e.preventDefault();

      const data = new FormData(form);

      const name = data.get("name").toString().trim();
      const email = data.get("email").toString().trim();

      const teach = ["teach1", "teach2", "teach3", "teach4", "teach5"]
        .map((key) => data.get(key).toString().trim())
        .filter(Boolean);

      const learn = ["learn1", "learn2", "learn3", "learn4", "learn5"]
        .map((key) => data.get(key).toString().trim())
        .filter(Boolean);

      let insight = "Tu perfil tiene alto potencial";

      if (teach.includes("Excel")) {
        insight = "Excel tiene alta demanda → monetización rápida";
      } else if (teach.includes("Inglés")) {
        insight = "Inglés es una skill global → puedes escalar ingresos";
      } else if (teach.length > 3) {
        insight = "Tienes múltiples habilidades → alto potencial de ingresos";
      }

      const templateParams = {
        name,
        user_email: email,
        teach: teach.join(", "),
        learn: learn.join(", "),
        insight,
      };

      emailjs
        .send("TU_SERVICE_ID", "TU_TEMPLATE_ID", templateParams)
        .then(function () {
          status.innerText = "📩 Email personalizado enviado 🚀";
        })
        .catch(function (error) {
          console.error(error);
          status.innerText = "❌ Error enviando email";
        });
    });
  </script>
</body>
</html>
