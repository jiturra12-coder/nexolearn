<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NexoLearn</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAV -->
<header class="nav">
  <h1 class="logo">NexoLearn</h1>
  <button class="btn-primary" onclick="scrollToForm()">Entrar</button>
</header>

<!-- HERO -->
<section class="hero">
  <h2>Convierte conocimiento en dinero</h2>
  <p>Aprende, enseña y genera ingresos reales.</p>
  <button class="btn-primary" onclick="scrollToForm()">Comenzar</button>
</section>

<!-- TERMINAL EXPERIENCE -->
<section class="terminal">
  <p>> Sistema activo</p>
  <h1>NEXOLEARN</h1>
  <p>No mostramos personas, mostramos conexiones óptimas.</p>
</section>

<!-- PLANILLA / ONBOARDING -->
<section class="form-section" id="formulario">
  <h2>Activa tu perfil</h2>

  <form id="profileForm">

    <input type="text" placeholder="Nombre" required>
    <input type="email" placeholder="Email" required>

    <h3>🎯 Habilidades que enseñas</h3>
    <input name="teach1" placeholder="Habilidad 1">
    <input name="teach2" placeholder="Habilidad 2">
    <input name="teach3" placeholder="Habilidad 3">
    <input name="teach4" placeholder="Habilidad 4">
    <input name="teach5" placeholder="Habilidad 5">

    <h3>📚 Intereses que quieres aprender</h3>
    <input name="learn1" placeholder="Interés 1">
    <input name="learn2" placeholder="Interés 2">
    <input name="learn3" placeholder="Interés 3">
    <input name="learn4" placeholder="Interés 4">
    <input name="learn5" placeholder="Interés 5">

    <button type="submit" class="btn-primary big">
      Activar perfil
    </button>

    <p id="status"></p>

  </form>
</section>

<!-- FOOTER -->
<footer>
  <p>© 2026 NexoLearn</p>
</footer>

<!-- SCRIPT -->
<script>
const form = document.getElementById("profileForm");
const status = document.getElementById("status");

form.addEventListener("submit", function(e) {
  e.preventDefault();

  const data = new FormData(form);

  const name = form[0].value;
  const email = form[1].value;

  const teach = [
    data.get("teach1"),
    data.get("teach2"),
    data.get("teach3"),
    data.get("teach4"),
    data.get("teach5"),
  ].filter(Boolean);

  const learn = [
    data.get("learn1"),
    data.get("learn2"),
    data.get("learn3"),
    data.get("learn4"),
    data.get("learn5"),
  ].filter(Boolean);

  // 🧠 LÓGICA SIMPLE DE INSIGHT
  let insight = "Tu perfil tiene alto potencial";

  if (teach.includes("Excel")) {
    insight = "Excel tiene alta demanda → monetización rápida";
  }

  if (teach.includes("Inglés")) {
    insight = "Inglés es una skill global → puedes escalar ingresos";
  }

  if (teach.length > 3) {
    insight = "Tienes múltiples habilidades → alto potencial de ingresos";
  }

  const templateParams = {
    name: name,
    user_email: email,
    teach: teach.join(", "),
    learn: learn.join(", "),
    insight: insight
  };

  emailjs.send("TU_SERVICE_ID", "TU_TEMPLATE_ID", templateParams)
    .then(() => {
      status.innerText = "📩 Email personalizado enviado 🚀";
    })
    .catch(() => {
      status.innerText = "❌ Error enviando email";
    });
});
</script>
</script>

</body>
</html>
