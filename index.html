<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NexoLearn</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #020617;
      color: white;
      margin: 0;
      text-align: center;
    }

    .container {
      max-width: 400px;
      margin: auto;
      padding: 40px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 6px;
      border: none;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #22c55e;
      border: none;
      color: black;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }

    h1 { margin-bottom: 10px; }
    p { color: #94a3b8; }
  </style>
</head>

<body>

<div class="container">

  <h1>NexoLearn 🚀</h1>
  <p>Activa tu cuenta</p>

  <form id="form">

    <input type="email" id="email" placeholder="Email" required>
    <input type="password" id="password" placeholder="Contraseña" required>

    <button type="submit">Crear cuenta</button>

  </form>

</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://zipnptfxkmlxsbtfzpjv.supabase.co",
  "sb_publishable_PuLdqxyGqq_UKWT7qNGMLQ_GYrw73Ry"
);

const form = document.getElementById("form");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabase.auth.signUp({
    email,
    password,
  });

  if (error) {
    alert("❌ " + error.message);
  } else {
    alert("📩 Revisa tu correo para confirmar tu cuenta");
  }
});
</script>

</body>
</html>
