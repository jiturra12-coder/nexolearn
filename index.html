<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NexoLearn - Perfil</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <div class="card">

      <!-- HEADER -->
      <div class="header">
        <h1>NexoLearn 🚀</h1>
        <p>Aprende. Enseña. Genera ingresos.</p>
      </div>

      <!-- FORM -->
      <form id="profileForm">

        <!-- ENSEÑAR -->
        <div class="section">
          <h2>🎯 Habilidades que enseñas</h2>

          <input name="teach1" placeholder="Habilidad 1">
          <input name="teach2" placeholder="Habilidad 2">
          <input name="teach3" placeholder="Habilidad 3">
          <input name="teach4" placeholder="Habilidad 4">
          <input name="teach5" placeholder="Habilidad 5">
        </div>

        <!-- APRENDER -->
        <div class="section">
          <h2>📚 Intereses que quieres aprender</h2>

          <input name="learn1" placeholder="Interés 1">
          <input name="learn2" placeholder="Interés 2">
          <input name="learn3" placeholder="Interés 3">
          <input name="learn4" placeholder="Interés 4">
          <input name="learn5" placeholder="Interés 5">
        </div>

        <!-- BOTÓN -->
        <button type="submit">Guardar perfil</button>

      </form>

    </div>
  </div>

  <!-- SCRIPT BASE (listo para conectar luego) -->
  <script>
    const form = document.getElementById("profileForm");

    form.addEventListener("submit", (e) => {
      e.preventDefault();

      const data = new FormData(form);

      const profile = {
        teach: [
          data.get("teach1"),
          data.get("teach2"),
          data.get("teach3"),
          data.get("teach4"),
          data.get("teach5"),
        ],
        learn: [
          data.get("learn1"),
          data.get("learn2"),
          data.get("learn3"),
          data.get("learn4"),
          data.get("learn5"),
        ],
      };

      console.log("📦 Perfil capturado:", profile);

      alert("Perfil listo 🚀 (revisar consola)");
    });
  </script>

</body>
</html>
